<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Two overlapping photo icons representing duplicates -->
  <rect x="8" y="6" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
  <rect x="6" y="8" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"
        fill-opacity="0.1"/>
  <!-- Mountain/sun inside the front photo -->
  <circle cx="13" cy="13" r="2" fill="currentColor" opacity="0.6"/>
  <polyline points="10,22 15,17 18,20 21,16 24,22" stroke="currentColor" stroke-width="1.5"
            fill="none" stroke-linejoin="round"/>
</svg>
